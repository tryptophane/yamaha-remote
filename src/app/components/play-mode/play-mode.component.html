@if (service.status(); as status) {
  <div>
    <button
      (click)="service.toggleRepeat(status.repeat)"
      [class.on]="status.repeat"
      aria-label="Repeat"
      mat-button
    >
      <mat-icon>repeat</mat-icon>
    </button>
    <button
      (click)="service.toggleShuffle(status.shuffle)"
      [class.on]="status.shuffle"
      aria-label="Shuffle"
      mat-button
    >
      <mat-icon>shuffle</mat-icon>
    </button>
  </div>
}
