<div class="input-selection">
  <mat-form-field>
    <mat-select
      (selectionChange)="this.service.setInputTo($event.value)"
      [disabled]="disabled()"
      [value]="currentInput()"
      panelClass="input-select-panel-class"
    >
      @for (item of service.inputList(); track item) {
        <mat-option value="{{ item.param }}">{{ item.title }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
