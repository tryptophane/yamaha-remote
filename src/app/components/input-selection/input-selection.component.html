<div class="input-selection">
  @if (inputsState()?.inputList; as inputList) {
    <mat-form-field>
      <mat-select
        (selectionChange)="this.service.setInputTo($event.value)"
        [disabled]="disabled()"
        [value]="currentInput()"
        panelClass="input-select-panel-class"
      >
        @for (input of inputList; track input) {
          <mat-option value="{{ input.param }}">{{ input.title }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  }
</div>
