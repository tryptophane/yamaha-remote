@if (netradioState(); as state) {
  <div class="net-radio-list">
    @if (state?.list?.menuStatus === 'Ready') {
      <mat-nav-list>
        @for (line of state.list?.lines; track line) {
          <mat-list-item
            (click)="selectRadioListLine(line)"
            [class.selected]="line.txt && line.txt === state.status?.station[0]"
          >
            <span>{{ line.txt | fixAmp }}</span>
          </mat-list-item>
        }
      </mat-nav-list>
    } @else {
      <div class="spinner">
        <mat-progress-spinner
          class="example-margin"
          color="accent"
          mode="indeterminate"
        >
        </mat-progress-spinner>
      </div>
    }
    <div class="net-radio-nav-button-bar">
      <button (click)="moveNetRadioCursor('BACK')" mat-button>
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button (click)="moveNetRadioCursor('DOWN')" mat-button>
        <mat-icon>expand_more</mat-icon>
      </button>
      <button (click)="moveNetRadioCursor('UP')" mat-button>
        <mat-icon>expand_less</mat-icon>
      </button>
    </div>
  </div>
}
